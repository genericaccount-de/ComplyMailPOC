services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./backend/config.yaml:/etc/complymail/config.yaml:ro
    environment:
      # Optional: keep the secret out of the config file and inject at runtime.
      - LLM_API_KEY=${LLM_API_KEY:-}
    depends_on: []

  smtp-proxy:
    build:
      context: ./smtp-proxy
      dockerfile: Dockerfile
    ports:
      - "2525:2525"
    volumes:
      - ./smtp-proxy/config.yaml:/etc/complymail/config.yaml:ro
    depends_on:
      - api

  admin-console:
    build:
      context: ./admin-console
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
